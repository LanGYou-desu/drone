<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D 无人机轨迹预测系统 | 多检测手段 + AI 建议</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
        }

        .sidebar {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 360px;
            background: rgba(17, 18, 22, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(108, 92, 231, 0.4);
            padding: 1.2rem;
            color: #eef2ff;
            z-index: 10;
            pointer-events: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            max-height: 90vh;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 1.3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #eef2ff, #b9c4f0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .method-section, .predict-section, .info-section, .ai-section, .animation-section, .chart-section {
            margin-top: 1.2rem;
            border-top: 1px solid rgba(108,92,231,0.3);
            padding-top: 1rem;
        }

        .method-section h3, .predict-section h3, .info-section h3, .ai-section h3, .animation-section h3, .chart-section h3 {
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            color: #cbd5ff;
            letter-spacing: 1px;
        }

        .method-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .method-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.4rem 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .method-item:hover {
            background: rgba(108, 92, 231, 0.2);
        }
        .method-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .method-name {
            flex: 1;
            font-size: 0.85rem;
        }
        .method-status {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 20px;
            background: rgba(0,0,0,0.3);
        }
        .method-status.active {
            background: #6c5ce7;
        }

        button {
            background: rgba(40, 42, 50, 0.8);
            border: 1px solid rgba(108, 92, 231, 0.5);
            color: #eef2ff;
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }
        button.primary {
            background: linear-gradient(135deg, #6c5ce7, #a363d9);
            border: none;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .info-card {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 0.6rem;
            margin: 0.5rem 0;
            font-size: 0.8rem;
        }

        .ai-suggestion {
            background: rgba(108, 92, 231, 0.2);
            border-left: 3px solid #6c5ce7;
            padding: 0.8rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .param-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .param-item {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 0.4rem;
            text-align: center;
        }
        .param-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .param-value {
            font-size: 1rem;
            font-weight: bold;
            color: #6c5ce7;
        }

        .slider-container {
            margin: 0.5rem 0;
        }
        input[type="range"] {
            width: 100%;
            background: #2a2c30;
            height: 4px;
            border-radius: 2px;
            -webkit-appearance: none;
        }
        input[type="range"]:focus {
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6c5ce7;
            cursor: pointer;
        }

        .chart-container {
            height: 200px;
            width: 100%;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            margin-top: 0.5rem;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #6c5ce7;
            padding: 8px 16px;
            border-radius: 20px;
            z-index: 1000;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .mouse-coord-tooltip {
            position: fixed;
            background: rgba(0, 0, 0, 0.7);
            color: #6c5ce7;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-family: monospace;
            pointer-events: none;
            z-index: 1000;
            backdrop-filter: blur(4px);
            border-left: 3px solid #6c5ce7;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        /* 备份列表样式 */
        .backup-item {
            transition: background 0.2s;
        }
        .backup-item:hover {
            background: #3d3f46 !important;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>✈️ 3D 无人机轨迹预测</h2>
        <p style="font-size: 0.7rem; opacity:0.7;">多检测手段 | AI 辅助捕捉建议 | 实时动画</p>

        <div style="margin: 1rem 0;">
            <a href="/analysis" target="_self" style="text-decoration: none;">
                <button style="background: linear-gradient(135deg, #ff6b6b, #a363d9); font-size: 1rem; font-weight: bold; padding: 0.8rem; border-radius: 48px; width: 100%; border: none; cursor: pointer; transition: transform 0.2s;">
                    📊 进入详细数据分析 →
                </button>
            </a>
        </div>

        <div class="method-section">
            <h3>📡 检测手段</h3>
            <div class="method-list" id="methodList"></div>
            <button id="refreshBtn">🔄 刷新轨迹数据</button>
            <button id="loadDataBtn" style="background: linear-gradient(135deg, #4ecdc4, #6c5ce7);">📂 加载外部数据</button>
            <button id="clearAllBtn" style="background: #ff6b6b;">🗑️ 清理所有数据（备份）</button>
            <button id="restoreBtn" style="background: #ff8c42;">💾 恢复备份</button>
            <button id="restoreAllBtn" style="background: #6c5ce7;">🔄 一键恢复所有平台</button>
            <!-- 备份列表模态框 -->
            <div id="backupModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;">
                <div style="background: #1e1f22; border-radius: 24px; padding: 20px; width: 400px; max-width: 80%; border: 1px solid #6c5ce7;">
                    <h3 style="margin-top:0;">选择备份文件</h3>
                    <div id="backupList" style="max-height: 300px; overflow-y: auto; margin: 10px 0;"></div>
                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                        <button id="closeModalBtn" style="flex:1;">取消</button>
                        <button id="confirmRestoreBtn" class="primary" style="flex:1;">恢复</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="animation-section">
            <h3>🎬 时间轴动画</h3>
            <div class="slider-container">
                <input type="range" id="timelineSlider" min="0" max="100" value="0" step="1">
                <div style="display: flex; justify-content: space-between;">
                    <span>起点</span><span>当前进度</span><span>终点</span>
                </div>
            </div>
            <div style="margin-top: 0.5rem;">
                <label>倍速：</label>
                <select id="speedSelect" style="background:#2a2c30; color:#fff; border-radius:20px; padding:0.3rem;">
                    <option value="0.5">0.5x</option>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                </select>
            </div>
            <select id="animationPlatform" style="width:100%; margin-top:0.5rem; background:#2a2c30; color:#fff; border-radius:20px; padding:0.3rem;">
                <option value="all">所有平台</option>
            </select>
            <button id="playBtn" class="primary">▶ 播放动画</button>
            <button id="replayBtn" class="primary" style="background: #ff8c42;">🔄 重新播放</button>
            <button id="stopBtn">⏹ 停止</button>
        </div>

        <div class="predict-section">
            <h3>🔮 轨迹预测</h3>
            <select id="predictPlatform" style="width:100%; background:#2a2c30; color:#fff; border-radius:20px; padding:0.3rem;">
                <option value="">选择平台</option>
                <option value="all">所有平台</option>
            </select>
            <button id="predictBtn" class="primary">⚡ 开始预测</button>
            <div class="info-card">
                <div>预测置信度: <span id="confidence">--</span></div>
                <div>预测点数: <span id="predPoints">0</span></div>
            </div>
        </div>

        <div class="info-section">
            <h3>📊 飞行参数</h3>
            <div id="paramPanel" class="param-panel"></div>
        </div>

        <div class="chart-section">
            <h3>📈 高度变化曲线</h3>
            <div id="heightChart" class="chart-container"></div>
        </div>

        <div class="ai-section">
            <h3>🤖 AI 捕捉建议</h3>
            <button id="aiSuggestionBtn">💡 获取 AI 建议</button>
            <div class="info-card">
                <div id="aiSuggestion" class="ai-suggestion">等待 AI 建议...</div>
            </div>
        </div>

        <div class="info-section">
            <h3>📊 实时统计</h3>
            <div class="info-card">
                <div>历史轨迹点数: <span id="histPoints">0</span></div>
                <div>可见手段数: <span id="visibleCount">0</span></div>
                <div>最后更新: <span id="lastUpdate">--:--:--</span></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="mouseCoordTooltip" class="mouse-coord-tooltip" style="display: none;"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // ======================== 从后端注入数据 ========================
        const methodsData = {{ methods_data | tojson }};
        let detectionMethods = methodsData;
        let predictedTrajectories = {};
        for (const id in detectionMethods) predictedTrajectories[id] = [];

        // Three.js 对象
        let scene, camera, renderer, labelRenderer, controls;
        let lines = {}, predLines = {}, movingSpheres = {}, trailParticles = {}, pointLight = null;
        let animationActive = false, animationId = null, currentPlatformForAnim = 'all';
        let heightChart = null;
        let audioCtx = null;
        let activePredAnimations = {};

        // 动画参数
        let animationStartTime = null;
        let animationSpeed = 1.0;
        let currentTimeRange = { start: 0, end: 0 };

        // 鼠标悬停相关
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let highlightedSphere = null;

        // ======================== 辅助函数 ========================
        function playBeep() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 800;
            gain.gain.value = 0.1;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.stop(audioCtx.currentTime + 0.5);
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.backgroundColor = isError ? '#ff6b6b' : '#6c5ce7';
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
            if (!isError) playBeep();
        }

        function updateStats() {
            let totalPoints = 0, visibleCount = 0;
            for (const id in detectionMethods) {
                if (detectionMethods[id].visible) visibleCount++;
                totalPoints += detectionMethods[id].points.length;
            }
            document.getElementById('histPoints').innerText = totalPoints;
            document.getElementById('visibleCount').innerText = visibleCount;
            document.getElementById('lastUpdate').innerText = new Date().toLocaleTimeString();
        }

        function computeParams(points, timestamps) {
            if (points.length < 2) return { speed: 0, height: points[0]?.[1] || 0, angle: 0 };
            const last = points[points.length-1], prev = points[points.length-2];
            const dt = timestamps ? timestamps[timestamps.length-1] - timestamps[timestamps.length-2] : 0.5;
            const dx = last[0] - prev[0], dz = last[2] - prev[2];
            const speed = Math.sqrt(dx*dx + dz*dz) / dt;
            const angle = Math.atan2(dz, dx) * 180 / Math.PI;
            return { speed: speed.toFixed(1), height: last[1].toFixed(1), angle: angle.toFixed(0) };
        }

        function updateParamPanel() {
            const container = document.getElementById('paramPanel');
            container.innerHTML = '';
            for (const [id, data] of Object.entries(detectionMethods)) {
                if (!data.visible) continue;
                const params = computeParams(data.points, data.timestamps);
                const div = document.createElement('div');
                div.className = 'param-item';
                div.innerHTML = `<div class="param-label">${data.name}</div>
                                 <div class="param-value">${params.speed} m/s</div>
                                 <div class="param-label">高:${params.height}m | 角:${params.angle}°</div>`;
                container.appendChild(div);
            }
        }

        function updateHeightChart() {
            if (!heightChart) return;
            const series = [];
            for (const [id, data] of Object.entries(detectionMethods)) {
                if (!data.visible) continue;
                series.push({
                    name: data.name,
                    type: 'line',
                    data: data.points.map(p => p[1]),
                    lineStyle: { color: data.color, width: 2 },
                    symbol: 'circle', symbolSize: 4
                });
            }
            heightChart.setOption({
                title: { text: '高度变化', textStyle: { color: '#fff' } },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', data: series[0]?.data.map((_, i) => i+1) || [], axisLabel: { color: '#ccc' } },
                yAxis: { type: 'value', name: '高度 (m)', axisLabel: { color: '#ccc' } },
                legend: {
                    textStyle: { color: '#fff' },
                    type: 'scroll',          // 水平滚动图例
                    orient: 'horizontal',
                    bottom: 0,               // 放在图表底部
                    itemWidth: 40,
                    itemHeight: 14
                },
                series: series,
                grid: {
                    containLabel: true,
                    backgroundColor: 'rgba(0,0,0,0.2)',
                    top: 60,                 // 为标题留出空间
                    bottom: 40,              // 为图例留出空间
                    left: 30,
                    right: 30
                }
            });
        }

        function updatePredictionUI() {
            let totalPredPoints = 0;
            for (const id in predictedTrajectories) totalPredPoints += predictedTrajectories[id].length;
            document.getElementById('predPoints').innerText = totalPredPoints;
            document.getElementById('confidence').innerText = (Math.random() * 30 + 70).toFixed(1) + '%';
        }

        // ======================== Three.js 场景构建 ========================
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x05070a);
            scene.fog = new THREE.FogExp2(0x05070a, 0.008);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 18);
            camera.lookAt(6, 3, 6);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            labelRenderer = new CSS2DRenderer();
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.domElement.style.position = 'absolute';
            labelRenderer.domElement.style.top = '0px';
            labelRenderer.domElement.style.left = '0px';
            labelRenderer.domElement.style.pointerEvents = 'none';
            document.body.appendChild(labelRenderer.domElement);
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.target.set(6, 3, 6);
            const gridHelper = new THREE.GridHelper(500, 500, 0x6c5ce7, 0x2a2c30);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(8);
            scene.add(axesHelper);
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0x6c5ce7, 0.5);
            backLight.position.set(-2, 5, -3);
            scene.add(backLight);
            pointLight = new THREE.PointLight(0x6c5ce7, 0.5, 10);
            scene.add(pointLight);
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 10000;
            const particlePositions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                particlePositions[i*3] = (Math.random() - 0.5) * 200;
                particlePositions[i*3+1] = Math.random() * 60;
                particlePositions[i*3+2] = (Math.random() - 0.5) * 200;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0x6c5ce7, size: 0.08, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                updateTrailParticles();
                renderer.render(scene, camera);
                labelRenderer.render(scene, camera);
            }
            animate();
        }

        // 创建平滑曲线轨迹（CatmullRomCurve3）
        function createSmoothCurveLine(points, color) {
            if (points.length < 2) return null;
            const curve = new THREE.CatmullRomCurve3(points.map(p => new THREE.Vector3(p[0], p[1], p[2])));
            // 采样更多点使曲线更平滑
            const divisions = Math.max(100, points.length * 5);
            const curvePoints = curve.getPoints(divisions);
            const geometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
            const material = new THREE.LineBasicMaterial({ color: color });
            return new THREE.Line(geometry, material);
        }

        function createTrailVisuals(id, data) {
            const points = data.points;
            if (points.length < 2) return;
            // 平滑曲线
            const smoothLine = createSmoothCurveLine(points, data.color);
            // 点云（小球）
            const sphereGroup = new THREE.Group();
            points.forEach(p => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x222222 }));
                sphere.position.set(p[0], p[1], p[2]);
                sphereGroup.add(sphere);
            });
            // 标签
            const startDiv = document.createElement('div');
            startDiv.textContent = '🚀 起点';
            startDiv.style.cssText = 'color:#fff; font-size:10px; background:rgba(0,0,0,0.5); padding:2px 4px; border-radius:4px';
            const startLabel = new CSS2DObject(startDiv);
            startLabel.position.set(points[0][0], points[0][1] + 0.3, points[0][2]);
            const endDiv = document.createElement('div');
            endDiv.textContent = '🏁 终点';
            endDiv.style.cssText = startDiv.style.cssText;
            const endLabel = new CSS2DObject(endDiv);
            endLabel.position.set(points[points.length-1][0], points[points.length-1][1] + 0.3, points[points.length-1][2]);
            const nameDiv = document.createElement('div');
            nameDiv.textContent = data.name;
            nameDiv.style.cssText = `color:${data.color}; font-size:12px; font-weight:bold; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:12px`;
            const nameLabel = new CSS2DObject(nameDiv);
            nameLabel.position.set(points[Math.floor(points.length/2)][0], points[Math.floor(points.length/2)][1] + 0.6, points[Math.floor(points.length/2)][2]);
            return { line: smoothLine, points: sphereGroup, startLabel, endLabel, nameLabel };
        }

        // 创建轨迹段视觉元素（用于动态显示）
        function createTrailVisualsSegment(methodId, data, segmentPoints) {
            const color = data.color;
            const smoothLine = createSmoothCurveLine(segmentPoints, color);
            const sphereGroup = new THREE.Group();
            segmentPoints.forEach(p => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), new THREE.MeshStandardMaterial({ color: color, emissive: 0x222222 }));
                sphere.position.set(p[0], p[1], p[2]);
                sphereGroup.add(sphere);
            });
            // 标签
            const startDiv = document.createElement('div');
            startDiv.textContent = '🚀 起点';
            startDiv.style.cssText = 'color:#fff; font-size:10px; background:rgba(0,0,0,0.5); padding:2px 4px; border-radius:4px';
            const startLabel = new CSS2DObject(startDiv);
            startLabel.position.set(segmentPoints[0][0], segmentPoints[0][1] + 0.3, segmentPoints[0][2]);

            const endDiv = document.createElement('div');
            endDiv.textContent = '🏁 当前';
            endDiv.style.cssText = startDiv.style.cssText;
            const endLabel = new CSS2DObject(endDiv);
            const lastPoint = segmentPoints[segmentPoints.length-1];
            endLabel.position.set(lastPoint[0], lastPoint[1] + 0.3, lastPoint[2]);

            const nameDiv = document.createElement('div');
            nameDiv.textContent = data.name;
            nameDiv.style.cssText = `color:${color}; font-size:12px; font-weight:bold; background:rgba(0,0,0,0.6); padding:2px 6px; border-radius:12px`;
            const nameLabel = new CSS2DObject(nameDiv);
            const midIdx = Math.floor(segmentPoints.length / 2);
            nameLabel.position.set(segmentPoints[midIdx][0], segmentPoints[midIdx][1] + 0.6, segmentPoints[midIdx][2]);

            return { line: smoothLine, points: sphereGroup, startLabel, endLabel, nameLabel };
        }

        // 更新轨迹段（仅显示从起点到当前时间点的轨迹）
        function updateTrailSegment(methodId, currentTime) {
            const data = detectionMethods[methodId];
            if (!data || !data.points.length || !data.timestamps.length) return;

            const points = data.points;
            const timestamps = data.timestamps;

            // 找到当前时间所在的索引
            let endIdx = 0;
            while (endIdx < timestamps.length - 1 && timestamps[endIdx + 1] < currentTime) endIdx++;

            // 截取到当前时间点的所有原始点
            let segmentPoints = points.slice(0, endIdx + 1);

            // 如果当前时间在两个点之间，且不是最后一个点，添加插值点
            if (endIdx < points.length - 1 && currentTime > timestamps[endIdx] && currentTime < timestamps[endIdx + 1]) {
                const ratio = (currentTime - timestamps[endIdx]) / (timestamps[endIdx + 1] - timestamps[endIdx]);
                const interpPoint = [
                    points[endIdx][0] + (points[endIdx+1][0] - points[endIdx][0]) * ratio,
                    points[endIdx][1] + (points[endIdx+1][1] - points[endIdx][1]) * ratio,
                    points[endIdx][2] + (points[endIdx+1][2] - points[endIdx][2]) * ratio
                ];
                segmentPoints.push(interpPoint);
            }

            // 移除旧视觉元素
            if (lines[methodId]) {
                if (lines[methodId].line) scene.remove(lines[methodId].line);
                if (lines[methodId].points) scene.remove(lines[methodId].points);
                if (lines[methodId].startLabel) scene.remove(lines[methodId].startLabel);
                if (lines[methodId].endLabel) scene.remove(lines[methodId].endLabel);
                if (lines[methodId].nameLabel) scene.remove(lines[methodId].nameLabel);
            }

            // 生成新的视觉元素
            if (segmentPoints.length >= 2) {
                const visuals = createTrailVisualsSegment(methodId, data, segmentPoints);
                lines[methodId] = visuals;
                if (visuals.line) scene.add(visuals.line);
                scene.add(visuals.points);
                if (visuals.startLabel) scene.add(visuals.startLabel);
                if (visuals.endLabel) scene.add(visuals.endLabel);
                if (visuals.nameLabel) scene.add(visuals.nameLabel);
            } else if (segmentPoints.length === 1) {
                // 只有一个点，只显示点云（无曲线）
                const sphereGroup = new THREE.Group();
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), new THREE.MeshStandardMaterial({ color: data.color, emissive: 0x222222 }));
                sphere.position.set(segmentPoints[0][0], segmentPoints[0][1], segmentPoints[0][2]);
                sphereGroup.add(sphere);
                lines[methodId] = { line: null, points: sphereGroup, startLabel: null, endLabel: null, nameLabel: null };
                scene.add(sphereGroup);
            }
        }

        function createPredictionLine(methodId, predPoints, color) {
            if (!predPoints || predPoints.length < 2) return null;
            const vertices = predPoints.map(p => new THREE.Vector3(p[0], p[1], p[2]));
            const lineGeometry = new THREE.BufferGeometry().setFromPoints(vertices);
            const material = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
            const lineObj = new THREE.Line(lineGeometry, material);
            const pointsGroup = new THREE.Group();
            predPoints.forEach(p => {
                const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshStandardMaterial({ color: color, emissive: 0x442200 }));
                sphere.position.set(p[0], p[1], p[2]);
                pointsGroup.add(sphere);
            });
            return { line: lineObj, points: pointsGroup };
        }

        function refreshVisuals() {
            for (const id in detectionMethods) {
                const data = detectionMethods[id];
                if (lines[id]) {
                    if (lines[id].line) scene.remove(lines[id].line);
                    scene.remove(lines[id].points);
                    scene.remove(lines[id].startLabel);
                    scene.remove(lines[id].endLabel);
                    scene.remove(lines[id].nameLabel);
                }
                if (predLines[id]) { scene.remove(predLines[id].line); scene.remove(predLines[id].points); }
                if (data.visible) {
                    const visuals = createTrailVisuals(id, data);
                    lines[id] = visuals;
                    if (visuals.line) scene.add(visuals.line);
                    scene.add(visuals.points);
                    scene.add(visuals.startLabel);
                    scene.add(visuals.endLabel);
                    scene.add(visuals.nameLabel);
                    if (predictedTrajectories[id] && predictedTrajectories[id].length > 0) {
                        const predVis = createPredictionLine(id, predictedTrajectories[id], data.color);
                        if (predVis) {
                            predLines[id] = predVis;
                            scene.add(predVis.line);
                            scene.add(predVis.points);
                        }
                    }
                } else { lines[id] = null; predLines[id] = null; }
            }
            updateStats(); updateParamPanel(); updateHeightChart();
        }

        // 拖尾粒子系统
        function initTrailSystem(methodId, color) {
            const particleCount = 2000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 400;
                positions[i*3+1] = Math.random() * 30;
                positions[i*3+2] = (Math.random() - 0.5) * 400;
                colors[i*3] = 0;
                colors[i*3+1] = 0;
                colors[i*3+2] = 0;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const material = new THREE.PointsMaterial({ size: 0.06, vertexColors: true, transparent: true, opacity: 0.6 });
            const points = new THREE.Points(geometry, material);
            scene.add(points);
            trailParticles[methodId] = { system: points, particles: [], nextIndex: 0 };
            for (let i = 0; i < particleCount; i++) trailParticles[methodId].particles.push({ position: new THREE.Vector3(), life: 0, color: new THREE.Color(color) });
        }

        function addTrailParticle(methodId, pos, color) {
            if (!trailParticles[methodId]) initTrailSystem(methodId, color);
            const tp = trailParticles[methodId];
            const idx = tp.nextIndex;
            const particle = tp.particles[idx];
            particle.position.copy(pos);
            particle.life = 1.0;
            particle.color.set(color);
            tp.nextIndex = (tp.nextIndex + 1) % tp.particles.length;
        }

        function updateTrailParticles() {
            for (const id in trailParticles) {
                const tp = trailParticles[id];
                const positionsAttr = tp.system.geometry.attributes.position.array;
                const colorsAttr = tp.system.geometry.attributes.color.array;
                for (let i = 0; i < tp.particles.length; i++) {
                    const p = tp.particles[i];
                    if (p.life > 0) {
                        p.life -= 0.02;
                        positionsAttr[i*3] = p.position.x;
                        positionsAttr[i*3+1] = p.position.y;
                        positionsAttr[i*3+2] = p.position.z;
                        colorsAttr[i*3] = p.color.r * p.life;
                        colorsAttr[i*3+1] = p.color.g * p.life;
                        colorsAttr[i*3+2] = p.color.b * p.life;
                    } else {
                        positionsAttr[i*3] = 0;
                        positionsAttr[i*3+1] = 0;
                        positionsAttr[i*3+2] = 0;
                        colorsAttr[i*3] = 0;
                        colorsAttr[i*3+1] = 0;
                        colorsAttr[i*3+2] = 0;
                    }
                }
                tp.system.geometry.attributes.position.needsUpdate = true;
                tp.system.geometry.attributes.color.needsUpdate = true;
            }
        }

        // ======================== 动画控制（基于真实时间戳和线性插值） ========================
        function interpolatePosition(points, timestamps, targetTime) {
            if (!points.length || !timestamps.length) return null;
            if (targetTime <= timestamps[0]) return points[0];
            if (targetTime >= timestamps[timestamps.length-1]) return points[points.length-1];
            let i = 0;
            while (i < timestamps.length-1 && timestamps[i+1] < targetTime) i++;
            const t1 = timestamps[i], t2 = timestamps[i+1];
            const p1 = points[i], p2 = points[i+1];
            const ratio = (targetTime - t1) / (t2 - t1);
            return [
                p1[0] + (p2[0] - p1[0]) * ratio,
                p1[1] + (p2[1] - p1[1]) * ratio,
                p1[2] + (p2[2] - p1[2]) * ratio
            ];
        }

        function getCurrentTimeRange() {
            if (currentPlatformForAnim === 'all') {
                let minT = Infinity, maxT = -Infinity;
                for (const id in detectionMethods) {
                    const ts = detectionMethods[id]?.timestamps;
                    if (ts && ts.length) {
                        minT = Math.min(minT, ts[0]);
                        maxT = Math.max(maxT, ts[ts.length-1]);
                    }
                }
                return { start: minT !== Infinity ? minT : 0, end: maxT !== -Infinity ? maxT : 0 };
            } else {
                const ts = detectionMethods[currentPlatformForAnim]?.timestamps;
                if (ts && ts.length) return { start: ts[0], end: ts[ts.length-1] };
                return { start: 0, end: 0 };
            }
        }

        function updateAnimationByTime(timestamp) {
            if (currentPlatformForAnim === 'all') {
                for (const id in detectionMethods) {
                    const points = detectionMethods[id].points;
                    const timestamps = detectionMethods[id].timestamps;
                    if (!points.length || !timestamps.length) continue;
                    const pos = interpolatePosition(points, timestamps, timestamp);
                    if (pos) {
                        if (!movingSpheres[id]) movingSpheres[id] = createMovingSphere(detectionMethods[id].color);
                        movingSpheres[id].position.set(pos[0], pos[1], pos[2]);
                        addTrailParticle(id, movingSpheres[id].position, detectionMethods[id].color);
                        // 仅在动画播放时动态更新轨迹段
                        if (animationActive) {
                            updateTrailSegment(id, timestamp);
                        }
                    }
                }
            } else {
                const id = currentPlatformForAnim;
                const points = detectionMethods[id]?.points;
                const timestamps = detectionMethods[id]?.timestamps;
                if (points && timestamps && points.length) {
                    const pos = interpolatePosition(points, timestamps, timestamp);
                    if (pos) {
                        if (!movingSpheres[id]) movingSpheres[id] = createMovingSphere(detectionMethods[id].color);
                        movingSpheres[id].position.set(pos[0], pos[1], pos[2]);
                        addTrailParticle(id, movingSpheres[id].position, detectionMethods[id].color);
                        if (pointLight) pointLight.position.set(pos[0], pos[1], pos[2]);
                        if (animationActive) {
                            updateTrailSegment(id, timestamp);
                        }
                    }
                }
            }
        }

        function startAnimation() {
            if (animationActive) return;
            const range = getCurrentTimeRange();
            if (range.end <= range.start) {
                showToast("所选平台没有有效时间数据，无法播放动画", true);
                return;
            }
            animationActive = true;
            const speed = parseFloat(document.getElementById('speedSelect').value);
            animationSpeed = speed;
            const totalDuration = (range.end - range.start) / animationSpeed;
            animationStartTime = performance.now();
            const startTimestamp = range.start;

            function step(now) {
                const elapsedSeconds = (now - animationStartTime) / 1000 * animationSpeed;
                const newTimestamp = startTimestamp + elapsedSeconds;
                if (newTimestamp >= range.end) {
                    stopAnimation();
                    updateAnimationByTime(range.end);
                } else {
                    updateAnimationByTime(newTimestamp);
                    // 同步滑块进度
                    const progress = (newTimestamp - range.start) / (range.end - range.start);
                    const slider = document.getElementById('timelineSlider');
                    if (slider) slider.value = progress * 100;
                    animationId = requestAnimationFrame(step);
                }
            }
            animationId = requestAnimationFrame(step);
        }

        function stopAnimation() {
            if (animationId) cancelAnimationFrame(animationId);
            animationActive = false;
            animationId = null;
            // 停止时恢复完整轨迹
            refreshVisuals();
        }

        function createMovingSphere(color) {
            const geometry = new THREE.SphereGeometry(0.25, 24, 24);
            const material = new THREE.MeshStandardMaterial({ color: color, emissive: 0x442200 });
            const sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);
            return sphere;
        }

        // 鼠标悬停坐标显示
        function onMouseMove(event) {
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = [];
            for (const id in lines) {
                if (lines[id] && lines[id].points) {
                    lines[id].points.children.forEach(sphere => allSpheres.push(sphere));
                }
            }
            const intersects = raycaster.intersectObjects(allSpheres);
            const tooltip = document.getElementById('mouseCoordTooltip');
            if (intersects.length > 0) {
                const hit = intersects[0];
                const point = hit.point;
                const coordStr = `(${point.x.toFixed(2)}, ${point.y.toFixed(2)}, ${point.z.toFixed(2)})`;
                tooltip.innerHTML = `📍 ${coordStr}`;
                tooltip.style.display = 'block';
                tooltip.style.left = (event.clientX + 15) + 'px';
                tooltip.style.top = (event.clientY - 25) + 'px';
                if (highlightedSphere) {
                    highlightedSphere.material.emissive.setHex(0x222222);
                }
                highlightedSphere = hit.object;
                highlightedSphere.material.emissive.setHex(0xff6600);
            } else {
                tooltip.style.display = 'none';
                if (highlightedSphere) {
                    highlightedSphere.material.emissive.setHex(0x222222);
                    highlightedSphere = null;
                }
            }
        }

        // 窗口缩放适配
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        window.addEventListener('resize', onWindowResize);

        // WASD 控制
        const keyState = { w: false, a: false, s: false, d: false };
        const moveSpeed = 0.2;
        function handleWASD() {
            if (!camera) return;
            const forward = new THREE.Vector3();
            const right = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0;
            forward.normalize();
            right.crossVectors(new THREE.Vector3(0, 1, 0), forward);
            right.normalize();
            let move = new THREE.Vector3(0, 0, 0);
            if (keyState.w) move.add(forward);
            if (keyState.s) move.sub(forward);
            if (keyState.d) move.sub(right);   // 修正：D 向右
            if (keyState.a) move.add(right);   // 修正：A 向左
            if (move.length() > 0) move.normalize();

            // 移动相机位置
            camera.position.x += move.x * moveSpeed;
            camera.position.z += move.z * moveSpeed;
            // 同步移动目标点，保持视线方向不变
            controls.target.x += move.x * moveSpeed;
            controls.target.z += move.z * moveSpeed;

            controls.update();
        }
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = true;
            if (key === 'a') keyState.a = true;
            if (key === 's') keyState.s = true;
            if (key === 'd') keyState.d = true;
        });
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') keyState.w = false;
            if (key === 'a') keyState.a = false;
            if (key === 's') keyState.s = false;
            if (key === 'd') keyState.d = false;
        });
        setInterval(handleWASD, 16);

        // ======================== 初始化 ========================
        initScene();
        renderMethodList();
        refreshVisuals();
        heightChart = echarts.init(document.getElementById('heightChart'));
        updateHeightChart();

        // 事件绑定
        document.getElementById('restoreBtn').addEventListener('click', showBackupModal);
        document.getElementById('restoreAllBtn').addEventListener('click', restoreAllBackups);
        document.getElementById('closeModalBtn').addEventListener('click', () => {
            document.getElementById('backupModal').style.display = 'none';
            window.selectedBackupFile = null;
        });
        document.getElementById('confirmRestoreBtn').addEventListener('click', confirmRestore);
        document.getElementById('refreshBtn').addEventListener('click', refreshData);
        document.getElementById('loadDataBtn').addEventListener('click', loadExternalData);
        document.getElementById('clearAllBtn').addEventListener('click', clearAllData);
        document.getElementById('predictBtn').addEventListener('click', runPrediction);
        document.getElementById('aiSuggestionBtn').addEventListener('click', getAISuggestion);
        document.getElementById('playBtn').addEventListener('click', startAnimation);
        document.getElementById('stopBtn').addEventListener('click', stopAnimation);
        document.getElementById('replayBtn').addEventListener('click', () => {
            if (animationActive) stopAnimation();
            const slider = document.getElementById('timelineSlider');
            if (slider) slider.value = 0;
            const range = getCurrentTimeRange();
            if (range.end > range.start) {
                updateAnimationByTime(range.start);
            }
            startAnimation();
        });
        document.getElementById('animationPlatform').addEventListener('change', (e) => {
            currentPlatformForAnim = e.target.value;
            if (!animationActive) {
                refreshVisuals();               // 恢复完整轨迹
                const range = getCurrentTimeRange();
                if (range.end > range.start) {
                    updateAnimationByTime(range.start);
                }
                const slider = document.getElementById('timelineSlider');
                if (slider) slider.value = 0;
            }
        });
        renderer.domElement.addEventListener('mousemove', onMouseMove);

        // 滑块拖动事件
        const timelineSlider = document.getElementById('timelineSlider');
        timelineSlider.addEventListener('input', (e) => {
            const progress = parseFloat(e.target.value) / 100;
            const range = getCurrentTimeRange();
            if (range.end <= range.start) return;
            const targetTime = range.start + progress * (range.end - range.start);
            if (animationActive) stopAnimation(); // 停止动画，但 stopAnimation 会恢复完整轨迹，我们随后要覆盖为轨迹段
            // 更新位置和轨迹段（手动调用，因为动画已停止）
            updateAnimationByTime(targetTime);    // 这会更新位置，但由于 animationActive=false，不会调用 updateTrailSegment
            // 手动调用 updateTrailSegment 来显示到当前位置的轨迹段
            if (currentPlatformForAnim === 'all') {
                for (const id in detectionMethods) {
                    updateTrailSegment(id, targetTime);
                }
            } else {
                updateTrailSegment(currentPlatformForAnim, targetTime);
            }
        });

        showToast("系统已启动，按 WASD 移动相机，鼠标悬停显示坐标");
    </script>
</body>
</html>
